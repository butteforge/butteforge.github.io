<header class="site-header">
  <div class="wrapper">
    <a class="site-title" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="{{ site.title | escape }}" width="80">
    </a>
    <nav class="site-nav">
      {% for item in site.nav %}
        <div class="nav-dropdown">
          <button class="nav-dropdown-toggle page-link" aria-haspopup="true" aria-expanded="false">
            {{ item.title }}
            <svg class="nav-chevron" viewBox="0 0 10 6" width="10" height="6" aria-hidden="true">
              <path d="M1 1l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <ul class="nav-dropdown-menu">
            {% for child_path in item.children %}
              {% assign child = site.pages | where: "path", child_path | first %}
              {% if child.title %}
                <li><a href="{{ child.url | relative_url }}">{{ child.title | escape }}</a></li>
              {% endif %}
            {% endfor %}
          </ul>
        </div>
      {% endfor %}
    </nav>
  </div>
</header>
